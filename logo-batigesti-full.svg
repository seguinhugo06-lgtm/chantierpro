<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <!--
    BatiGesti Logo — Full (Icon + Text)
    Primary: #22c55e | Secondary: #1e293b
    Usage: Header, marketing, documentation
  -->

  <!-- ICON: Stylized B with équerre/building element -->
  <g transform="translate(4, 4)">
    <!-- B vertical pillar -->
    <rect x="0" y="8" width="8" height="48" rx="1.5" fill="#1e293b" />

    <!-- B upper block (floor 2) -->
    <rect x="8" y="8" width="20" height="20" rx="2" fill="#22c55e" />

    <!-- B lower block (floor 1) -->
    <rect x="8" y="32" width="24" height="24" rx="2" fill="#1e293b" />

    <!-- Équerre / roof angle on top -->
    <polygon points="0,8 34,8 34,0 28,0 0,0" fill="#22c55e" />
    <rect x="28" y="0" width="6" height="14" rx="1" fill="#22c55e" />

    <!-- Window details on lower block -->
    <rect x="13" y="38" width="6" height="6" rx="1" fill="#22c55e" opacity="0.85" />
    <rect x="22" y="38" width="6" height="6" rx="1" fill="#22c55e" opacity="0.85" />
    <rect x="13" y="48" width="6" height="6" rx="1" fill="#22c55e" opacity="0.6" />
    <rect x="22" y="48" width="6" height="6" rx="1" fill="#22c55e" opacity="0.6" />

    <!-- Subtle grid lines on upper block (blueprint feel) -->
    <line x1="18" y1="10" x2="18" y2="26" stroke="#fff" stroke-width="0.7" opacity="0.3" />
    <line x1="10" y1="18" x2="26" y2="18" stroke="#fff" stroke-width="0.7" opacity="0.3" />
  </g>

  <!-- TEXT: BatiGesti -->
  <text x="52" y="42" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#1e293b">Bati</tspan><tspan fill="#22c55e">Gesti</tspan>
  </text>
</svg>